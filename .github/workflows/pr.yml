name: Pull Request

on:
  pull_request:
    branches: [ master ]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        framework: [net462, net8.0]
        exclude:
          - os: ubuntu-latest
            framework: net462

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x

    - name: Restore dependencies
      run: |
        dotnet restore src/Dapper.AmbientContext/Dapper.AmbientContext.csproj
        dotnet restore test/Dapper.AmbientContext.Tests/Dapper.AmbientContext.Tests.csproj

    - name: Build
      run: |
        dotnet build src/Dapper.AmbientContext/Dapper.AmbientContext.csproj --no-restore --configuration Release
        dotnet build test/Dapper.AmbientContext.Tests/Dapper.AmbientContext.Tests.csproj --no-restore --configuration Release

    - name: Test ${{ matrix.framework }}
      run: dotnet test test/Dapper.AmbientContext.Tests/Dapper.AmbientContext.Tests.csproj --no-build --configuration Release --framework ${{ matrix.framework }} --logger "trx;LogFileName=test-results-${{ matrix.framework }}.trx"

    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: |
          **/test-results-*.trx
