name: CI/CD

on:
  push:
    branches:
      - master

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        framework: [net462, net8.0]
        exclude:
          - os: ubuntu-latest
            framework: net462

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run Unit Tests ${{ matrix.framework }} on ${{ matrix.os }}
      run: dotnet test test/Dapper.AmbientContext.UnitTests/Dapper.AmbientContext.UnitTests.csproj --no-build --configuration Release --framework ${{ matrix.framework }}

    - name: Run Integration Tests
      if: matrix.os == 'ubuntu-latest' && matrix.framework == 'net8.0'
      run: dotnet test test/Dapper.AmbientContext.IntegrationTests/Dapper.AmbientContext.IntegrationTests.csproj --no-build --configuration Release --framework net8.0

  release:
    needs: test
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x

    - name: Install semantic-release
      run: npm install -g semantic-release@23 @semantic-release/changelog@6 @semantic-release/github@10 conventional-changelog-conventionalcommits@7

    - name: Get Version Before Release
      id: before_version
      run: |
        BEFORE_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        echo "before_tag=$BEFORE_TAG" >> $GITHUB_OUTPUT

    - name: Semantic Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx semantic-release

    - name: Get Release Version
      id: get_version
      run: |
        AFTER_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        BEFORE_TAG="${{ steps.before_version.outputs.before_tag }}"

        if [ -n "$AFTER_TAG" ] && [ "$AFTER_TAG" != "$BEFORE_TAG" ]; then
          VERSION=${AFTER_TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Released version: $VERSION"
        else
          echo "No new release created"
          echo "version=" >> $GITHUB_OUTPUT
        fi

    - name: Restore dependencies
      if: steps.get_version.outputs.version != ''
      run: dotnet restore

    - name: Build
      if: steps.get_version.outputs.version != ''
      run: dotnet build --no-restore --configuration Release /p:Version=${{ steps.get_version.outputs.version }}

    - name: Pack NuGet
      if: steps.get_version.outputs.version != ''
      run: dotnet pack src/Dapper.AmbientContext/Dapper.AmbientContext.csproj --no-build --configuration Release --output ./artifacts /p:PackageVersion=${{ steps.get_version.outputs.version }}

    - name: Push to NuGet
      if: steps.get_version.outputs.version != ''
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
